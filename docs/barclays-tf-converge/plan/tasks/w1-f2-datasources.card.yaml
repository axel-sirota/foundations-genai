id: w1-f2-datasources
title: "Data sources for SHARED resources (domain, exec role, VPC, 25 participant users)"
type: feature
priority: P0
section: 00-foundation
files_touched:
  - new_infra/terraform/data.tf
shared_resources: []
depends_on: [w1-f1-scaffold]
wave: 1
phase: schema   # producer: exposes data outputs (exec role ARN, user ARNs) others consume
dod_tests:
  - "terraform -chdir=new_infra/terraform plan  shows these as DATA reads, 0 resource changes"
  - "data.aws_caller_identity.account == 962804699607 and region == us-west-2"
human_owner: axel
tf_intents:
  - object: data.aws_caller_identity / data.aws_region
    operation: read
    details: {assert: "account 962804699607, region us-west-2"}
  - object: data.aws_iam_role.exec
    operation: read
    details: {name: SageMakerStudentExecutionRole, exposes: arn}
  - object: data.aws_iam_user.participant[01..25]
    operation: read
    details: {for_each: 25 participant users, exposes: arn (consumed by w2-i1)}
  - object: data.shared_domain / vpc / subnet
    operation: read
    details: {domain_id: d-bquhieanzgod, documented read-only}
shared_invariant: >
  EVERY shared object here is a `data` block, NEVER a `resource`. No destroy/replace of the
  domain, exec role, VPC, or any participant user. (B10)
notes: >
  B10 invariant card. The participant-user data sources are what w2-i1 attaches the new S3
  policy to; the exec-role ARN is what w1-p1 puts on the profiles. Pure reads.
